<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1220;
    --surface: #141D30;
    --surface-hover: #1A2540;
    --rule: #2A3552;
    --text: #E8E6DF;
    --text-muted: #8B93A7;
    --gold: #C9A867;
    --positive: #5FB98A;
    --negative: #E07A6B;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .masthead {
    border-bottom: 1px solid var(--rule);
    padding: 36px 24px 20px;
    text-align: center;
    position: relative;
  }

  .masthead .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(32px, 5vw, 52px);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .masthead .date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  .rule-thin {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    max-width: 320px;
    margin: 14px auto 0;
  }

  .chat-btn {
    position: absolute;
    top: 24px;
    right: 24px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .chat-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .disclaimer {
    font-size: 12.5px;
    color: var(--text-muted);
    border-left: 2px solid var(--gold);
    padding: 10px 16px;
    margin-bottom: 32px;
    font-style: italic;
    max-width: 720px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 20px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .card:hover {
    border-color: var(--gold);
    background: var(--surface-hover);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--gold);
  }

  .price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }

  .company-name {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    margin: 2px 0 10px;
  }

  .change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    margin-bottom: 14px;
  }

  .change.up { color: var(--positive); }
  .change.down { color: var(--negative); }

  .target {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .target .label {
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    margin-right: 6px;
  }

  .summary {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 14px;
  }

  .news {
    border-top: 1px solid var(--rule);
    padding-top: 10px;
  }

  .news a {
    display: block;
    font-size: 12.5px;
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .news a:hover { color: var(--gold); }

  .analyst-actions {
    margin-bottom: 14px;
  }

  .analyst-actions .label {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    display: block;
    margin-bottom: 6px;
  }

  .analyst-row {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
    border-bottom: 1px solid var(--rule);
  }

  .analyst-row:last-child {
    border-bottom: none;
  }

  .analyst-firm {
    color: var(--text);
    font-weight: 500;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 8px;
  }

  .analyst-grade {
    white-space: nowrap;
  }

  .analyst-grade.up { color: var(--positive); }
  .analyst-grade.down { color: var(--negative); }
  .analyst-grade.neutral { color: var(--text-muted); }

  .analyst-date {
    color: var(--text-muted);
    font-size: 10px;
    margin-left: 8px;
    white-space: nowrap;
  }

  .source-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--gold);
    padding: 1px 5px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .footer-note {
    text-align: center;
    margin-top: 48px;
    font-size: 12.5px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state h2 {
    font-family: 'Fraunces', serif;
    color: var(--text);
    font-weight: 500;
  }

  /* Chat modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 1000;
    align-items: center;
    justify-content: flex-end;
  }

  .modal.open {
    display: flex;
  }

  .modal-content {
    background: var(--surface);
    border-left: 1px solid var(--gold);
    max-width: 360px;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    animation: slideIn 0.25s ease-out;
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }

  .close-btn:hover { color: var(--gold); }

  .chat-container {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-message {
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.5;
  }

  .chat-message.user {
    background: rgba(201, 168, 103, 0.15);
    color: var(--gold);
    align-self: flex-end;
    max-width: 85%;
  }

  .chat-message.assistant {
    background: var(--surface-hover);
    color: var(--text);
    border: 1px solid var(--rule);
    align-self: flex-start;
    max-width: 85%;
  }

  .chat-input-area {
    display: flex;
    gap: 8px;
  }

  .chat-input {
    flex: 1;
    padding: 9px 12px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .chat-input:focus {
    border-color: var(--gold);
  }

  .chat-send {
    padding: 9px 14px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    transition: opacity 0.15s;
  }

  .chat-send:hover { opacity: 0.85; }

  .chat-send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  @media print {
    .chat-btn, .modal { display: none !important; }

    body {
      background: #fff;
      color: #111;
    }

    .masthead { border-bottom-color: #999; }
    .masthead .eyebrow, .masthead .date { color: #444; }
    .rule-thin { background: #999; }

    .disclaimer { color: #444; border-left-color: #999; }

    .container { max-width: 100%; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #999;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .card:hover { background: #fff; border-color: #999; }

    .ticker, .target .label, .analyst-actions .label { color: #555; }
    .price, .company-name, .summary, .analyst-firm { color: #111; }
    .target, .analyst-row, .analyst-date, .news a, .footer-note { color: #444; }
    .target { border-bottom-color: #ccc; }
    .analyst-row { border-bottom-color: #ccc; }

    .change.up { color: #1a7a4a; }
    .change.down { color: #a8352a; }
    .analyst-grade.up { color: #1a7a4a; }
    .analyst-grade.down { color: #a8352a; }
    .analyst-grade.neutral { color: #555; }

    .source-badge { background: #ccc; color: #111; }

    .news, .analyst-row:last-child { border-top-color: #ccc; border-bottom-color: transparent; }
  }
</style>
</head>
<body>

  <div class="masthead">
    <button class="chat-btn" id="chatBtn">&#128172; Ask Claude</button>
    <div class="eyebrow">30 Companies Tracked</div>
    <h1>The Daily Brief</h1>
    <div class="date" id="report-date">Loading...</div>
    <div class="rule-thin"></div>
  </div>

  <div class="container">
    <div class="disclaimer" id="disclaimer"></div>
    <div class="grid" id="grid"></div>
    <div class="footer-note" id="company-count"></div>
  </div>

  <div id="chatModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">
        Ask Claude
        <button class="close-btn" id="closeChat">&#x2715;</button>
      </div>
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Ask about your stocks...">
          <button class="chat-send" id="chatSend">Send</button>
        </div>
      </div>
    </div>
  </div>

<script>
let allData = [];
let chatHistory = [];
let apiKey = null;

async function loadReport() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('reports/latest.json');
    if (!res.ok) throw new Error('no report found');
    const report = await res.json();

    document.getElementById('report-date').textContent = report.date;
    document.getElementById('disclaimer').textContent = report.disclaimer;
    document.getElementById('company-count').textContent =
      `${report.companies.length} companies in today's brief — to add more, edit companies.json and rerun fetch_report.py`;

    allData = report.companies || [];

    if (!allData.length) {
      grid.innerHTML = `<div class="empty-state"><h2>No data yet</h2><p>Run fetch_report.py to generate today's brief.</p></div>`;
      return;
    }

    grid.innerHTML = allData.map(c => {
      const isUp = (c.change ?? 0) >= 0;
      const arrow = isUp ? '&#9650;' : '&#9660;';
      const changeClass = isUp ? 'up' : 'down';
      const newsHtml = (c.news || []).map(n => {
        const badge = n.site ? `<span class="source-badge">${n.site}</span>` : '';
        return `<a href="${n.url || '#'}" target="_blank" rel="noopener">${badge}${n.title || ''}</a>`;
      }).join('');

      const pt = c.priceTarget;
      const targetHtml = pt
        ? `<div class="target">
            <span class="label">Analyst Target</span>
            $${(+pt.mean).toFixed(2)} avg
            &nbsp;&middot;&nbsp; H&nbsp;$${(+pt.high).toFixed(2)}
            &nbsp;&middot;&nbsp; L&nbsp;$${(+pt.low).toFixed(2)}
            &nbsp;&middot;&nbsp; ${pt.numAnalysts || '?'} analysts
            &nbsp;&middot;&nbsp; ${pt.recommendation || 'n/a'}
          </div>`
        : '';

      const actions = c.analystActions || [];
      const actionsHtml = actions.length
        ? `<div class="analyst-actions">
            <span class="label">Recent Analyst Ratings</span>
            ${actions.map(a => {
              const action = (a.action || '').toLowerCase();
              const gradeClass = action === 'up' ? 'up' : action === 'down' ? 'down' : 'neutral';
              const gradeText = a.toGrade
                ? (a.fromGrade ? `${a.fromGrade} &#8594; ${a.toGrade}` : a.toGrade)
                : (a.action || '');
              return `<div class="analyst-row">
                <span class="analyst-firm">${a.firm || 'Unknown'}</span>
                <span class="analyst-grade ${gradeClass}">${gradeText}</span>
                <span class="analyst-date">${a.date || ''}</span>
              </div>`;
            }).join('')}
          </div>`
        : '';

      return `
        <div class="card">
          <div class="card-top">
            <span class="ticker">${c.ticker}</span>
            <span class="price">$${(c.price ?? 0).toFixed(2)}</span>
          </div>
          <div class="company-name">${c.name || c.ticker}</div>
          <div class="change ${changeClass}">${arrow} ${(c.change ?? 0).toFixed(2)} (${(c.changePercent ?? 0).toFixed(2)}%)</div>
          ${targetHtml}
          ${actionsHtml}
          <div class="summary">${c.summary || ''}</div>
          ${newsHtml ? `<div class="news">${newsHtml}</div>` : ''}
        </div>
      `;
    }).join('');

  } catch (err) {
    grid.innerHTML = `<div class="empty-state"><h2>No report yet</h2><p>Run <code>python fetch_report.py</code> first, then refresh this page.</p></div>`;
    document.getElementById('report-date').textContent = '—';
  }
}

function addChatMessage(text, isUser) {
  chatHistory.push({ role: isUser ? 'user' : 'assistant', content: text });
  const messagesDiv = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = `chat-message ${isUser ? 'user' : 'assistant'}`;
  el.textContent = text;
  messagesDiv.appendChild(el);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey) {
    apiKey = prompt('Enter your Anthropic API key (stored for this session only):');
    if (!apiKey) return;
  }

  input.value = '';
  sendBtn.disabled = true;
  addChatMessage(text, true);

  const stockContext = allData.map(s =>
    `${s.ticker} (${s.name || s.ticker}): $${(s.price ?? 0).toFixed(2)}, ${(s.changePercent ?? 0).toFixed(2)}% today`
  ).join('\n');

  const systemPrompt = `You are a concise financial assistant for a personal stock dashboard. Current portfolio data:\n${stockContext}\n\nAnswer questions about these stocks factually and briefly (1-3 sentences). Do not provide financial advice.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: systemPrompt,
        messages: chatHistory.filter(m => m.role === 'user' || m.role === 'assistant').map(m => ({
          role: m.role,
          content: m.content
        }))
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    addChatMessage(data.content[0].text, false);
  } catch (error) {
    addChatMessage(`Error: ${error.message}`, false);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

document.getElementById('chatBtn').addEventListener('click', () => {
  document.getElementById('chatModal').classList.add('open');
  document.getElementById('chatInput').focus();
});

document.getElementById('closeChat').addEventListener('click', () => {
  document.getElementById('chatModal').classList.remove('open');
});

document.getElementById('chatSend').addEventListener('click', sendChatMessage);

document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendChatMessage();
});

document.getElementById('chatModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('chatModal')) {
    document.getElementById('chatModal').classList.remove('open');
  }
});

loadReport();
</script>

</body>
</html>
