<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1220;
    --surface: #141D30;
    --surface-hover: #1A2540;
    --rule: #2A3552;
    --text: #E8E6DF;
    --text-muted: #8B93A7;
    --gold: #C9A867;
    --positive: #5FB98A;
    --negative: #E07A6B;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .masthead {
    border-bottom: 1px solid var(--rule);
    padding: 36px 24px 20px;
    text-align: center;
  }

  .masthead .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(32px, 5vw, 52px);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .masthead .date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  .rule-thin {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    max-width: 320px;
    margin: 14px auto 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .disclaimer {
    font-size: 12.5px;
    color: var(--text-muted);
    border-left: 2px solid var(--gold);
    padding: 10px 16px;
    margin-bottom: 32px;
    font-style: italic;
    max-width: 720px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 20px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .card:hover {
    border-color: var(--gold);
    background: var(--surface-hover);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--gold);
  }

  .price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
  }

  .company-name {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    margin: 2px 0 10px;
  }

  .change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    margin-bottom: 14px;
  }

  .change.up { color: var(--positive); }
  .change.down { color: var(--negative); }

  .target {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .target .label {
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    margin-right: 6px;
  }

  .summary {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 14px;
  }

  .news {
    border-top: 1px solid var(--rule);
    padding-top: 10px;
  }

  .news a {
    display: block;
    font-size: 12.5px;
    color: var(--text-muted);
    text-decoration: none;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .news a:hover { color: var(--gold); }

  .footer-note {
    text-align: center;
    margin-top: 48px;
    font-size: 12.5px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state h2 {
    font-family: 'Fraunces', serif;
    color: var(--text);
    font-weight: 500;
  }
</style>
</head>
<body>

  <div class="masthead">
    <div class="eyebrow">25 Companies Tracked</div>
    <h1>The Daily Brief</h1>
    <div class="date" id="report-date">Loading...</div>
    <div class="rule-thin"></div>
  </div>

  <div class="container">
    <div class="disclaimer" id="disclaimer"></div>
    <div class="grid" id="grid"></div>
    <div class="footer-note" id="company-count"></div>
  </div>

<script>
async function loadReport() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('reports/latest.json');
    if (!res.ok) throw new Error('no report found');
    const report = await res.json();

    document.getElementById('report-date').textContent = report.date;
    document.getElementById('disclaimer').textContent = report.disclaimer;
    document.getElementById('company-count').textContent =
      `${report.companies.length} companies in today's brief — to add more, edit companies.json and rerun fetch_report.py`;

    if (!report.companies.length) {
      grid.innerHTML = `<div class="empty-state"><h2>No data yet</h2><p>Run fetch_report.py to generate today's brief.</p></div>`;
      return;
    }

    grid.innerHTML = report.companies.map(c => {
      const isUp = (c.change ?? 0) >= 0;
      const arrow = isUp ? '▲' : '▼';
      const changeClass = isUp ? 'up' : 'down';
      const newsHtml = (c.news || []).map(n =>
        `<a href="${n.url || '#'}" target="_blank" rel="noopener">${n.title || ''}</a>`
      ).join('');

      const pt = c.priceTarget;
      const targetHtml = pt
        ? `<div class="target"><span class="label">Analyst Target</span>$${pt.mean} avg (${pt.numAnalysts || '?'} analysts, ${pt.recommendation || 'n/a'})</div>`
        : '';

      return `
        <div class="card">
          <div class="card-top">
            <span class="ticker">${c.ticker}</span>
            <span class="price">$${(c.price ?? 0).toFixed(2)}</span>
          </div>
          <div class="company-name">${c.name || c.ticker}</div>
          <div class="change ${changeClass}">${arrow} ${(c.change ?? 0).toFixed(2)} (${(c.changePercent ?? 0).toFixed(2)}%)</div>
          ${targetHtml}
          <div class="summary">${c.summary || ''}</div>
          ${newsHtml ? `<div class="news">${newsHtml}</div>` : ''}
        </div>
      `;
    }).join('');

  } catch (err) {
    grid.innerHTML = `<div class="empty-state"><h2>No report yet</h2><p>Run <code>python fetch_report.py</code> first, then refresh this page.</p></div>`;
    document.getElementById('report-date').textContent = '—';
  }
}

loadReport();
</script>

</body>
</html>
