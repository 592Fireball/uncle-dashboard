<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Brief</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1428;
            color: #e0e0e0;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light-mode {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #d4af37;
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #d4af37;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            padding: 10px 15px;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            border-radius: 4px;
            font-size: 14px;
            width: 250px;
        }

        .search-box::placeholder {
            color: #d4af3777;
        }

        body.light-mode .search-box {
            color: #333;
            border-color: #d4af37;
            background: white;
        }

        body.light-mode .search-box::placeholder {
            color: #999;
        }

        .filter-pills {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 6px 12px;
            border: 1px solid #666;
            background: transparent;
            color: #aaa;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .pill.active {
            border-color: #d4af37;
            color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        body.light-mode .pill {
            color: #666;
            border-color: #999;
        }

        body.light-mode .pill.active {
            border-color: #d4af37;
            color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .settings-btn, .chat-btn {
            background: transparent;
            border: 1px solid #666;
            color: #aaa;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .settings-btn:hover, .chat-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        body.light-mode .settings-btn, body.light-mode .chat-btn {
            color: #666;
            border-color: #999;
        }

        body.light-mode .settings-btn:hover, body.light-mode .chat-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: flex-end;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: #1a2332;
            padding: 30px;
            border-left: 1px solid #d4af37;
            max-width: 320px;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        body.light-mode .modal-content {
            background: white;
            border-left-color: #d4af37;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            color: #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .setting-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 10px;
            display: block;
        }

        body.light-mode .setting-label {
            color: #666;
        }

        .setting-group select,
        .setting-group input {
            width: 100%;
            padding: 8px;
            background: #0a1428;
            color: #d4af37;
            border: 1px solid #666;
            border-radius: 4px;
            font-size: 14px;
        }

        body.light-mode .setting-group select,
        body.light-mode .setting-group input {
            background: #f0f0f0;
            color: #333;
            border-color: #ddd;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .switch {
            position: relative;
            width: 40px;
            height: 20px;
            background: #555;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .switch.on {
            background: #d4af37;
        }

        .switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .switch.on::after {
            left: 22px;
        }

        /* Chat styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 10px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.4;
        }

        .chat-message.user {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            text-align: right;
        }

        .chat-message.assistant {
            background: rgba(100, 100, 120, 0.3);
            color: #ccc;
        }

        body.light-mode .chat-message.user {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
        }

        body.light-mode .chat-message.assistant {
            background: rgba(200, 200, 200, 0.2);
            color: #333;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .chat-input {
            flex: 1;
            padding: 8px;
            background: #0a1428;
            color: #d4af37;
            border: 1px solid #666;
            border-radius: 4px;
            font-size: 13px;
        }

        body.light-mode .chat-input {
            background: white;
            color: #333;
            border-color: #ddd;
        }

        .chat-send {
            padding: 8px 12px;
            background: #d4af37;
            color: #0a1428;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }

        .chat-send:hover {
            background: #e8c547;
        }

        .chat-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 4px;
            padding: 20px;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        body.light-mode .card {
            background: white;
            border-color: #e0e0e0;
        }

        body.light-mode .card:hover {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        .card.compact {
            padding: 15px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .ticker {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #d4af37;
        }

        .price {
            font-size: 18px;
            font-weight: 500;
            font-family: 'Monaco', 'Menlo', monospace;
            letter-spacing: 0.5px;
            color: #d4af37;
        }

        .price.up {
            color: #4ade80;
        }

        .price.down {
            color: #f87171;
        }

        .change {
            font-size: 12px;
            margin-top: 4px;
        }

        .change.up {
            color: #4ade80;
        }

        .change.down {
            color: #f87171;
        }

        .target-section {
            margin: 12px 0;
            padding: 10px;
            background: rgba(212, 175, 55, 0.05);
            border-left: 2px solid #d4af37;
            border-radius: 2px;
            font-size: 13px;
        }

        body.light-mode .target-section {
            background: rgba(212, 175, 55, 0.03);
        }

        .target-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.light-mode .target-label {
            color: #666;
        }

        .target-price {
            color: #d4af37;
            font-size: 14px;
            font-weight: 500;
            margin: 4px 0;
        }

        .target-rating {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        body.light-mode .target-rating {
            color: #666;
        }

        .divider {
            height: 1px;
            background: #2a3f5f;
            margin: 12px 0;
        }

        body.light-mode .divider {
            background: #e0e0e0;
        }

        .news-section {
            margin-top: 12px;
        }

        .news-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 8px;
        }

        body.light-mode .news-title {
            color: #666;
        }

        .news-item {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .news-source {
            display: inline-block;
            background: #d4af37;
            color: #0a1428;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-right: 6px;
        }

        .news-link {
            color: #d4af37;
            text-decoration: none;
            font-size: 13px;
            word-break: break-word;
        }

        .news-link:hover {
            text-decoration: underline;
        }

        body.light-mode .news-link {
            color: #d4af37;
        }

        .summary {
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
            margin-top: 12px;
        }

        body.light-mode .summary {
            color: #444;
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }

        body.light-mode .no-data {
            color: #999;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DAILY BRIEF</h1>
            <div class="controls">
                <input type="text" class="search-box" id="searchInput" placeholder="Search ticker or company...">
                <div class="header-buttons">
                    <button class="chat-btn" id="chatBtn">
                        <span>💬</span> Ask Claude
                    </button>
                    <button class="settings-btn" id="settingsBtn">
                        <span>⚙️</span> Settings
                    </button>
                </div>
            </div>
        </header>

        <div class="filter-pills">
            <button class="pill active" data-filter="all">All</button>
            <button class="pill" data-filter="gainers">Gainers</button>
            <button class="pill" data-filter="losers">Losers</button>
        </div>

        <div id="grid" class="grid">
            <div class="loading">Loading data...</div>
        </div>
    </div>

    <div id="chatModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">
                Chat with Claude
                <button class="close-btn" id="closeChat">✕</button>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about your stocks...">
                    <button class="chat-send" id="chatSend">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">
                Settings
                <button class="close-btn" id="closeSettings">✕</button>
            </div>

            <div class="setting-group">
                <label class="setting-label">Sort by</label>
                <select id="sortSelect">
                    <option value="ticker">Alphabetical</option>
                    <option value="gainers">Biggest Gainers</option>
                    <option value="losers">Biggest Losers</option>
                    <option value="price">Price (High to Low)</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Card Detail</label>
                <select id="densitySelect">
                    <option value="full">Full</option>
                    <option value="compact">Compact</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="setting-label">Theme</label>
                <div class="toggle-switch">
                    <span>Dark</span>
                    <div class="switch" id="themeToggle"></div>
                    <span>Light</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'all';
        let currentSort = 'ticker';
        let currentDensity = 'full';
        let chatHistory = [];

        // Sample data (for preview; will be overwritten by real data if it exists)
        const sampleData = [
            {
                ticker: "AAPL",
                company_name: "Apple Inc.",
                price: 192.34,
                previous_close: 190.12,
                target_price: 210.50,
                number_analysts: 45,
                rating: "Buy",
                news: [
                    { title: "Apple reports record quarterly revenue", url: "https://example.com/1", site: "Reuters" },
                    { title: "iPhone 15 sales exceed expectations", url: "https://example.com/2", site: "CNBC" }
                ],
                summary: "Apple is trading near its 52-week highs with strong momentum. Recent earnings beat expectations and guidance remains positive. Analysts maintain a bullish stance."
            }
        ];

        function loadData() {
            fetch('reports/latest.json')
                .then(res => res.json())
                .then(data => {
                    allData = data.companies || [];
                    render();
                })
                .catch(err => {
                    console.log('Using sample data for preview');
                    allData = sampleData;
                    render();
                });
        }

        function render() {
            let filtered = allData.filter(item => {
                const matchesFilter = currentFilter === 'all' ||
                    (currentFilter === 'gainers' && item.price > item.previous_close) ||
                    (currentFilter === 'losers' && item.price < item.previous_close);

                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const matchesSearch = !searchTerm ||
                    item.ticker.toLowerCase().includes(searchTerm) ||
                    item.company_name.toLowerCase().includes(searchTerm);

                return matchesFilter && matchesSearch;
            });

            // Sort
            filtered.sort((a, b) => {
                switch (currentSort) {
                    case 'gainers':
                        return ((b.price - b.previous_close) / b.previous_close * 100) -
                               ((a.price - a.previous_close) / a.previous_close * 100);
                    case 'losers':
                        return ((a.price - a.previous_close) / a.previous_close * 100) -
                               ((b.price - b.previous_close) / b.previous_close * 100);
                    case 'price':
                        return b.price - a.price;
                    default: // ticker
                        return a.ticker.localeCompare(b.ticker);
                }
            });

            const grid = document.getElementById('grid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-data">No companies match your filters</div>';
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const change = item.price - item.previous_close;
                const changePercent = (change / item.previous_close * 100).toFixed(2);
                const isGain = change >= 0;

                let newsHtml = '';
                if (item.news && item.news.length > 0) {
                    newsHtml = `
                        <div class="news-section">
                            <div class="news-title">Latest News</div>
                            ${item.news.map(n => `
                                <div class="news-item">
                                    <span class="news-source">${n.site || 'News'}</span>
                                    <a href="${n.url}" target="_blank" class="news-link">${n.title}</a>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                const targetHtml = item.target_price ? `
                    <div class="target-section">
                        <div class="target-label">Analyst Target</div>
                        <div class="target-price">$${item.target_price.toFixed(2)}</div>
                        ${item.number_analysts ? `<div class="target-rating">${item.number_analysts} analysts • ${item.rating || 'N/A'}</div>` : ''}
                    </div>
                ` : '';

                if (currentDensity === 'compact') {
                    return `
                        <div class="card compact">
                            <div class="card-header">
                                <div class="ticker">${item.ticker}</div>
                                <div class="price ${isGain ? 'up' : 'down'}">${item.price.toFixed(2)}</div>
                            </div>
                            <div class="change ${isGain ? 'up' : 'down'}">${isGain ? '+' : ''}${changePercent}%</div>
                            ${targetHtml}
                        </div>
                    `;
                } else {
                    return `
                        <div class="card">
                            <div class="card-header">
                                <div>
                                    <div class="ticker">${item.ticker}</div>
                                    <div style="font-size: 12px; color: #999;">${item.company_name}</div>
                                </div>
                            </div>
                            <div class="price ${isGain ? 'up' : 'down'}">${item.price.toFixed(2)}</div>
                            <div class="change ${isGain ? 'up' : 'down'}">${isGain ? '+' : ''}${changePercent}%</div>
                            ${targetHtml}
                            <div class="divider"></div>
                            ${newsHtml}
                            ${item.summary ? `<div class="summary">${item.summary}</div>` : ''}
                        </div>
                    `;
                }
            }).join('');
        }

        function addChatMessage(text, isUser) {
            chatHistory.push({ role: isUser ? 'user' : 'assistant', content: text });
            const messagesDiv = document.getElementById('chatMessages');
            const messageEl = document.createElement('div');
            messageEl.className = `chat-message ${isUser ? 'user' : 'assistant'}`;
            messageEl.textContent = text;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addChatMessage(text, true);

            // Build context from current stocks
            const stockContext = allData.map(s => 
                `${s.ticker}: $${s.price} (${s.changePercent > 0 ? '+' : ''}${s.changePercent}%) - Target: $${s.target_price || 'N/A'}`
            ).join('\n');

            const systemPrompt = `You are a helpful AI assistant for a stock portfolio dashboard. You have access to current stock data for the user's portfolio: ${stockContext}. 
Answer questions about these stocks concisely and helpfully. Keep responses brief (1-2 sentences). Do not provide financial advice, only factual information and analysis.`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': prompt('Your Anthropic API Key (stored only in this session):') || ''
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 300,
                        system: systemPrompt,
                        messages: chatHistory.map(m => ({
                            role: m.role,
                            content: m.content
                        }))
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const reply = data.content[0].text;
                addChatMessage(reply, false);
            } catch (error) {
                addChatMessage(`Sorry, I couldn't process that. Error: ${error.message}`, false);
            }
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', render);

        document.querySelectorAll('.pill').forEach(pill => {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                render();
            });
        });

        document.getElementById('chatBtn').addEventListener('click', () => {
            document.getElementById('chatModal').classList.add('open');
        });

        document.getElementById('closeChat').addEventListener('click', () => {
            document.getElementById('chatModal').classList.remove('open');
        });

        document.getElementById('chatSend').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.add('open');
        });

        document.getElementById('closeSettings').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.remove('open');
        });

        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            render();
        });

        document.getElementById('densitySelect').addEventListener('change', (e) => {
            currentDensity = e.target.value;
            render();
        });

        document.getElementById('themeToggle').addEventListener('click', function() {
            this.classList.toggle('on');
            document.body.classList.toggle('light-mode');
        });

        // Load data on startup
        loadData();
    </script>
</body>
</html>
